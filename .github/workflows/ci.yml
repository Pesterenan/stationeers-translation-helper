name: CI Check (Typecheck & Lint)

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Type Check
        run: npx tsc -b
        # We use 'tsc -b' to perform full type checking without running the full Vite build.

      - name: Run Lint
        run: npm run lint
